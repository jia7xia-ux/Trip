<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OUR WORLD - 轻奢流光双人旅行足迹大屏</title>
  
  <!-- 引入 Leaflet 地图核心与 Google 衬线字体 -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,600;1,400&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    /* --- 1. 核心视觉变量（升级：轻奢极光渐变色系） --- */
    :root {
      /* 将纯黑底色改为高级的暮色极光渐变基调 */
      --bg-gradient: linear-gradient(135deg, #1a1625 0%, #12111a 40%, #1a1e29 100%);
      /* 提升面板透明度，加强毛玻璃感，确保高清晰度 */
      --card-glass: rgba(30, 27, 33, 0.65);
      --accent-gold: #e5c39e;     /* 柔和香槟金 */
      --neon-pink: #ff8fa9;       /* 蜜桃霓虹粉 */
      --text-primary: #f7f5f6;    /* 高亮主字 */
      --text-muted: #bdafc1;      /* 带有微紫调的辅助字 */
      --border-light: rgba(229, 195, 158, 0.18);
      --border-med: rgba(255, 143, 169, 0.35);
      --glass-filter: blur(30px) saturate(140%);
      --font-serif: 'Playfair Display', 'Noto Serif SC', serif;
      --font-sans: 'Noto Sans SC', sans-serif;
      --ease-apple: cubic-bezier(0.16, 1, 0.3, 1);
      /* 增加多层次流光阴影，让卡片物理悬浮感更强 */
      --shadow-ambient: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-gradient);
      color: var(--text-primary);
      font-family: var(--font-sans);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* --- 背景流光层（极光呼吸感） --- */
    body::before {
      content: '';
      position: absolute;
      top: -10%; left: -10%;
      width: 120%; height: 120%;
      background: radial-gradient(circle at 20% 30%, rgba(255, 143, 169, 0.08) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(229, 195, 158, 0.06) 0%, transparent 50%);
      z-index: 1;
      pointer-events: none;
    }

    /* --- 2. 顶栏胶囊布局 (Topbar) --- */
    .topbar {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 48px);
      max-width: 1200px;
      height: 64px;
      background: var(--card-glass);
      backdrop-filter: var(--glass-filter);
      -webkit-backdrop-filter: var(--glass-filter);
      border: 1px solid var(--border-light);
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      z-index: 900;
      box-shadow: var(--shadow-ambient);
    }
    .logo {
      font-family: var(--font-serif);
      font-size: 18px;
      color: var(--text-primary);
      background: linear-gradient(90deg, var(--text-primary) 0%, var(--accent-gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 4px;
      font-weight: 400;
    }
    .nav-group { display: flex; gap: 12px; }
    .nav-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 1px;
      transition: all 0.4s var(--ease-apple);
    }
    .nav-btn:hover { color: var(--text-primary); }
    .nav-btn.active {
      border-color: var(--border-med);
      color: var(--text-primary);
      background: rgba(255, 143, 169, 0.1);
      box-shadow: 0 0 15px rgba(255, 143, 169, 0.15);
    }

    /* --- 3. 悬浮球体投影底图 --- */
    .map-wrapper {
      position: absolute;
      inset: 0;
      z-index: 10;
      padding: 100px 40px 120px 40px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .sphere-container {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 1000px;
      max-height: 680px;
      border-radius: 40px; /* 改为高级大圆角，配合极光风 */
      box-shadow: 0 20px 50px rgba(0,0,0,0.3), inset 0 0 40px rgba(0,0,0,0.6);
      overflow: hidden;
      border: 1px solid var(--border-light);
    }
    #map {
      width: 100%;
      height: 100%;
      background: #14131a;
    }

    /* 升级：带渐变光晕的打卡点 Marker */
    .neon-marker {
      background: transparent;
      border: none;
    }
    .neon-heart {
      width: 18px;
      height: 18px;
      background: linear-gradient(135deg, var(--neon-pink) 0%, #ff5376 100%);
      transform: rotate(45deg);
      border-radius: 4px;
      position: relative;
      box-shadow: 0 0 15px rgba(255, 143, 169, 0.6), 0 0 30px rgba(255, 143, 169, 0.3);
      animation: pulseGlow 2.5s infinite ease-in-out;
    }
    .neon-heart::before, .neon-heart::after {
      content: '';
      width: 18px;
      height: 18px;
      background: #ff6584;
      border-radius: 50%;
      position: absolute;
    }
    .neon-heart::before { top: -9px; left: 0; }
    .neon-heart::after { left: -9px; top: 0; }

    @keyframes pulseGlow {
      0%, 100% { transform: rotate(45deg) scale(0.95); opacity: 0.9; box-shadow: 0 0 12px rgba(255, 143, 169, 0.5); }
      50% { transform: rotate(45deg) scale(1.15); opacity: 1; box-shadow: 0 0 25px rgba(255, 143, 169, 0.8), 0 0 40px rgba(255, 143, 169, 0.4); }
    }

    /* --- 4. 底部数据统计药丸 (Stats Pill) --- */
    .stats-pill {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-glass);
      backdrop-filter: var(--glass-filter);
      -webkit-backdrop-filter: var(--glass-filter);
      border: 1px solid var(--border-light);
      padding: 12px 40px;
      border-radius: 40px;
      display: flex;
      gap: 48px;
      z-index: 900;
      box-shadow: var(--shadow-ambient);
    }
    .stat-item { text-align: center; }
    .stat-label { font-size: 11px; color: var(--text-muted); letter-spacing: 1.5px; margin-bottom: 4px; }
    .stat-val { 
      font-family: var(--font-serif); 
      font-size: 20px; 
      background: linear-gradient(180deg, #ffffff 0%, var(--accent-gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 600; 
    }

    /* --- 5. 侧边滑出面板组件 (Panel) --- */
    .side-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 400px;
      height: 100vh;
      background: rgba(22, 19, 26, 0.75);
      backdrop-filter: var(--glass-filter);
      -webkit-backdrop-filter: var(--glass-filter);
      border-left: 1px solid var(--border-light);
      z-index: 950;
      transform: translateX(100%);
      transition: transform 0.6s var(--ease-apple);
      padding: 100px 32px 40px 32px;
      display: flex;
      flex-direction: column;
    }
    .side-panel.open { transform: translateX(0); box-shadow: -20px 0 50px rgba(0,0,0,0.3); }
    .panel-title { font-family: var(--font-serif); font-size: 22px; color: var(--text-primary); font-weight: 300; margin-bottom: 32px; letter-spacing: 1px; }
    
    /* 模块：时光轴 */
    .timeline-container { flex: 1; overflow-y: auto; padding-right: 8px; }
    .timeline-item { position: relative; padding-left: 24px; margin-bottom: 24px; cursor: pointer; transition: transform 0.3s; }
    .timeline-item:hover { transform: translateX(4px); }
    .timeline-item::before {
      content: ''; position: absolute; left: 0; top: 6px; width: 8px; height: 8px; background: var(--neon-pink); border-radius: 50%; box-shadow: 0 0 10px var(--neon-pink);
    }
    .timeline-item::after {
      content: ''; position: absolute; left: 3px; top: 18px; bottom: -20px; width: 2px; background: rgba(255,143,169,0.15);
    }
    .timeline-item:last-child::after { display: none; }
    .tl-date { font-family: var(--font-serif); font-size: 12px; color: var(--accent-gold); }
    .tl-name { font-size: 14px; color: var(--text-primary); margin-top: 2px; font-weight: 400; }

    /* 模块：心愿单 */
    .wish-input-box { display: flex; gap: 12px; margin-bottom: 24px; }
    .wish-list { flex: 1; overflow-y: auto; }
    .wish-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-light); border-radius: 14px; margin-bottom: 12px; backdrop-filter: blur(10px); }
    .wish-text { font-size: 13px; color: var(--text-primary); }
    .wish-text.done { color: var(--text-muted); text-decoration: line-through; opacity: 0.5; }
    .wish-cb { width: 18px; height: 18px; accent-color: var(--neon-pink); cursor: pointer; border-radius: 4px; }

    /* --- 6. 双栏流光画册弹窗 (Modal) --- */
    .modal {
      display: none; position: fixed; inset: 0; background: rgba(14,12,18,0.65); backdrop-filter: blur(20px); z-index: 1000; align-items: center; justify-content: center; padding: 20px;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: rgba(30, 26, 36, 0.85); border: 1px solid var(--border-light); border-radius: 28px; width: 100%; max-width: 780px; max-height: 85vh; display: grid; grid-template-columns: 1fr 1fr; box-shadow: var(--shadow-ambient); position: relative; overflow: hidden;
    }
    .modal-close-btn { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; z-index: 10; transition: color 0.3s; }
    .modal-close-btn:hover { color: var(--text-primary); }
    
    .modal-left { padding: 32px; border-right: 1px solid var(--border-light); overflow-y: auto; }
    .modal-right { padding: 32px; overflow-y: auto; background: rgba(20,18,25,0.4); }

    /* 输入框组件 */
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 1px; }
    .form-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border-light); border-radius: 12px; padding: 12px; color: var(--text-primary); font-size: 13px; transition: all 0.3s; }
    .form-input:focus { outline: none; border-color: var(--border-med); background: rgba(255,255,255,0.08); }
    
    /* 记账九宫格 */
    .expense-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; }
    .exp-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border-light); border-radius: 10px; padding: 10px; text-align: center; }
    .exp-label { font-size: 11px; color: var(--text-muted); }
    .exp-input { width: 100%; background: transparent; border: none; text-align: center; color: var(--accent-gold); font-family: var(--font-serif); font-size: 15px; margin-top: 2px; font-weight: 600; }
    .exp-input:focus { outline: none; }
    
    /* 照片墙与渐变占位符 */
    .photo-scroller { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; margin-top: 8px; }
    .photo-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; border: 1px solid var(--border-light); cursor: pointer; transition: transform 0.2s; }
    .photo-thumb:hover { transform: scale(1.05); }
    .view-hero-placeholder {
      width: 100%; height: 180px; background: linear-gradient(45deg, #251f30 0%, #1a1822 100%); border: 1px dashed var(--border-light); border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px;
    }

    .btn-action { background: linear-gradient(90deg, #e5c39e 0%, #ff8fa9 100%); color: #17121e; border: none; padding: 14px 24px; border-radius: 24px; font-weight: 600; font-size: 13px; cursor: pointer; width: 100%; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(255, 143, 169, 0.2); transition: opacity 0.3s; }
    .btn-action:hover { opacity: 0.95; }

    /* 常驻 Apple 提醒条 */
    .apple-alert {
      position: fixed; top: 104px; left: 50%; transform: translateX(-50%) translateY(-20px); background: linear-gradient(90deg, #e5c39e 0%, #ff8fa9 100%); color: #17121e; padding: 10px 28px; border-radius: 20px; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; z-index: 850; pointer-events: none; opacity: 0; transition: all 0.4s var(--ease-apple); box-shadow: 0 10px 25px rgba(255, 143, 169, 0.25);
    }
    .apple-alert.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 143, 169, 0.2); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- 1. 顶栏胶囊 -->
  <div class="topbar">
    <div class="logo">✦ OUR WORLD</div>
    <div class="nav-group">
      <button class="nav-btn" id="btn-timeline" onclick="togglePanel('timeline')">🕐 时光轴</button>
      <button class="nav-btn" id="btn-wish" onclick="togglePanel('wish')">✨ 心愿清单</button>
      <button class="nav-btn" id="btn-mode-add" onclick="toggleAddMode()">💝 打卡足迹</button>
    </div>
  </div>

  <div class="apple-alert" id="mode-alert">互动模式开启：请在中心地图上任意点击，封存双人足迹坐标</div>

  <!-- 2. 悬浮极光圆角底图 -->
  <div class="map-wrapper">
    <div class="sphere-container">
      <div id="map"></div>
    </div>
  </div>

  <!-- 3. 底部悬浮统计药丸 -->
  <div class="stats-pill">
    <div class="stat-item">
      <div class="stat-label">EXPLORED CITIES</div>
      <div class="stat-val" id="stat-cities">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">TOTAL JOURNEYS</div>
      <div class="stat-val" id="stat-trips">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">MUTUAL BUDGET</div>
      <div class="stat-val" id="stat-budget">¥0</div>
    </div>
  </div>

  <!-- 4. 侧边滑出面板 -->
  <div class="side-panel" id="side-panel">
    <div id="panel-content-timeline" style="display:none; flex-direction:column; height:100%;">
      <h3 class="panel-title">时光叙事轴</h3>
      <div class="timeline-container" id="timeline-list"></div>
    </div>
    <div id="panel-content-wish" style="display:none; flex-direction:column; height:100%;">
      <h3 class="panel-title">下一站心愿</h3>
      <div class="wish-input-box">
        <input type="text" id="input-wish" class="form-input" placeholder="输入浪漫目的地..." style="flex:1;">
        <button class="nav-btn active" onclick="addWish()" style="padding:0 16px;">添加</button>
      </div>
      <div class="wish-list" id="wish-container"></div>
    </div>
  </div>

  <!-- 5. 核心双栏画册弹窗 -->
  <div class="modal" id="main-modal">
    <div class="modal-content">
      <button class="modal-close-btn" onclick="closeModal()">×</button>
      
      <div class="modal-left">
        <h3 style="font-family: var(--font-serif); font-size: 18px; color: var(--accent-gold); margin-bottom: 20px; font-weight: 400;">封存新映像</h3>
        
        <!-- AI 智能扫描 -->
        <div style="background: linear-gradient(180deg, rgba(255,143,169,0.05) 0%, rgba(0,0,0,0) 100%); border: 1px dashed var(--border-med); padding: 14px; margin-bottom: 16px; position: relative; border-radius: 12px;">
          <div style="display: flex; align-items: center; justify-content: space-between;">
            <div>
              <div style="font-size: 12px; color: var(--text-primary);">AI 票据智能校准</div>
              <div style="font-size: 10px; color: var(--text-muted); margin-top: 2px;">解析截图并自动填报开销</div>
            </div>
            <button type="button" class="nav-btn active" style="font-size: 11px; padding: 4px 12px;" onclick="document.getElementById('ai-file').click()">导入凭证</button>
          </div>
          <input type="file" id="ai-file" accept="image/*" style="display:none;" onchange="simulateAIScan()">
          <div id="ai-loading" style="position: absolute; inset: 0; background: #1a1625; display: none; align-items: center; justify-content: center; font-size: 11px; color: var(--accent-gold); font-family: var(--font-serif); letter-spacing: 1px;">PARSING BILL STRUCTURE...</div>
        </div>

        <form id="trip-form" onsubmit="saveTripData(event)">
          <input type="hidden" id="field-id">
          <div class="form-group">
            <label class="form-label">目的地 (失焦自动校准坐标)</label>
            <input type="text" id="field-place" class="form-input" required placeholder="例如：大理古城" onblur="geoLookup()">
          </div>
          <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div>
              <label class="form-label">启程日期</label>
              <input type="date" id="field-start" class="form-input" required>
            </div>
            <div>
              <label class="form-label">归期</label>
              <input type="date" id="field-end" class="form-input" required>
            </div>
          </div>
          <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div>
              <label class="form-label">LAT (纬度)</label>
              <input type="number" step="0.000001" id="field-lat" class="form-input" required>
            </div>
            <div>
              <label class="form-label">LNG (经度)</label>
              <input type="number" step="0.000001" id="field-lng" class="form-input" required>
            </div>
          </div>
          <button type="submit" class="btn-action">将这段岁月归档</button>
        </form>
      </div>

      <div class="modal-right">
        <div class="form-group">
          <label class="form-label">消费明细账目 (CNY)</label>
          <div class="expense-grid">
            <div class="exp-box"><div class="exp-label">交通</div><input type="number" id="exp-transport" class="exp-input" value="0"></div>
            <div class="exp-box"><div class="exp-label">住宿</div><input type="number" id="exp-stay" class="exp-input" value="0"></div>
            <div class="exp-box"><div class="exp-label">餐饮</div><input type="number" id="exp-food" class="exp-input" value="0"></div>
            <div class="exp-box"><div class="exp-label">游玩</div><input type="number" id="exp-play" class="exp-input" value="0"></div>
            <div class="exp-box"><div class="exp-label">其他</div><input type="number" id="exp-other" class="exp-input" value="0"></div>
            <div class="exp-box" style="background: rgba(255,143,169,0.1); border-color: var(--border-med);"><div class="exp-label" style="color:var(--neon-pink);">总额</div><div id="exp-total-display" style="font-family:var(--font-serif); font-size:15px; color:var(--neon-pink); margin-top:2px; font-weight:600;">0</div></div>
          </div>
        </div>

        <div class="form-group" style="margin-top: 24px;">
          <label class="form-label">独家独白随笔</label>
          <textarea id="field-note" class="form-input" rows="3" style="resize: none; height: 75px;" placeholder="记下属于你们这一刻的独特细节..."></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">影集胶片墙</label>
          <div id="view-hero-area"></div>
          <div style="display: flex; gap: 8px; align-items: center;">
            <button type="button" class="nav-btn" style="font-size: 11px; padding: 6px 14px; border-color: var(--border-light); color: var(--text-primary);" onclick="document.getElementById('photo-file').click()">＋ 载入影集图片</button>
            <input type="file" id="photo-file" accept="image/*" style="display:none;" onchange="handlePhotoUpload(event)">
          </div>
          <div class="photo-scroller" id="photo-preview-box"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- --- 7. 底层引擎与数据流逻辑 --- -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const STORAGE_TRIPS_KEY = 'cwt_trips_v2';
    const STORAGE_WISHES_KEY = 'cwt_wishes_v1';

    let globalTrips = [];
    let globalWishes = [];
    let mapEngine;
    let mapMarkers = [];
    let currentActivePanel = null;
    let isAdd足迹Mode = false;
    let currentUploadedPhotos = [];

    window.onload = function() {
      loadStorageData();
      initVisualMap();
      calculateDashboardStats();
      setupExpenseListener();
    };

    function loadStorageData() {
      globalTrips = JSON.parse(localStorage.getItem(STORAGE_TRIPS_KEY)) || [];
      globalWishes = JSON.parse(localStorage.getItem(STORAGE_WISHES_KEY)) || [];
    }

    function saveTripsState() {
      localStorage.setItem(STORAGE_TRIPS_KEY, JSON.stringify(globalTrips));
      calculateDashboardStats();
      renderVisualMarkers();
      if(currentActivePanel === 'timeline') renderTimeline();
    }

    function saveWishesState() {
      localStorage.setItem(STORAGE_WISHES_KEY, JSON.stringify(globalWishes));
      if(currentActivePanel === 'wish') renderWishes();
    }

    function initVisualMap() {
      mapEngine = L.map('map', { zoomControl: false, attributionControl: false }).setView([28.00, 105.00], 4);

      // 地图样式同样采用更具层次的 Dark Matter 渲染
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 18 }).addTo(mapEngine);

      mapEngine.on('click', function(e) {
        if (!isAdd足迹Mode) return;
        openCreateModalFromMap(e.latlng.lat, e.latlng.lng);
      });
      renderVisualMarkers();
    }

    function renderVisualMarkers() {
      mapMarkers.forEach(m => mapEngine.removeLayer(m));
      mapMarkers = [];

      globalTrips.forEach(trip => {
        if (!trip.lat || !trip.lng) return;
        const customIcon = L.divIcon({
          className: 'neon-marker',
          html: `<div class="neon-heart" onclick="openDetailView('${trip.id}')"></div>`,
          iconSize: [18, 18],
          iconAnchor: [9, 9]
        });
        const marker = L.marker([trip.lat, trip.lng], { icon: customIcon }).addTo(mapEngine);
        mapMarkers.push(marker);
      });
    }

    function calculateDashboardStats() {
      document.getElementById('stat-trips').innerText = globalTrips.length;
      const uniqueCities = new Set(globalTrips.map(t => t.place.trim()));
      document.getElementById('stat-cities').innerText = uniqueCities.size;

      let grandTotal = 0;
      globalTrips.forEach(t => {
        if (t.expenses && t.expenses.total) grandTotal += parseFloat(t.expenses.total);
      });
      document.getElementById('stat-budget').innerText = '¥' + grandTotal.toLocaleString();
    }

    function togglePanel(type) {
      const panel = document.getElementById('side-panel');
      const btnTimeline = document.getElementById('btn-timeline');
      const btnWish = document.getElementById('btn-wish');

      if (currentActivePanel === type) {
        panel.classList.remove('open');
        btnTimeline.classList.remove('active');
        btnWish.classList.remove('active');
        currentActivePanel = null;
      } else {
        panel.classList.add('open');
        document.getElementById('panel-content-timeline').style.display = type === 'timeline' ? 'flex' : 'none';
        document.getElementById('panel-content-wish').style.display = type === 'wish' ? 'flex' : 'none';
        btnTimeline.classList.toggle('active', type === 'timeline');
        btnWish.classList.toggle('active', type === 'wish');
        currentActivePanel = type;
        if (type === 'timeline') renderTimeline();
        if (type === 'wish') renderWishes();
      }
    }

    function renderTimeline() {
      const container = document.getElementById('timeline-list');
      container.innerHTML = '';
      const sorted = [...globalTrips].sort((a,b) => new Date(b.startDate) - new Date(a.startDate));
      if(sorted.length === 0) {
        container.innerHTML = `<div style="color:var(--text-muted); font-size:12px; font-style:italic;">暂无脚印，点击打卡足迹开启第一站...</div>`;
        return;
      }
      sorted.forEach(t => {
        const item = document.createElement('div');
        item.className = 'timeline-item';
        item.onclick = () => openDetailView(t.id);
        item.innerHTML = `
          <div class="tl-date">${t.startDate}</div>
          <div class="tl-name">${t.place}</div>
        `;
        container.appendChild(item);
      });
    }

    function renderWishes() {
      const container = document.getElementById('wish-container');
      container.innerHTML = '';
      if(globalWishes.length === 0) {
        container.innerHTML = `<div style="color:var(--text-muted); font-size:12px; font-style:italic;">还没有写下心愿清单哦...</div>`;
        return;
      }
      globalWishes.forEach(w => {
        const item = document.createElement('div');
        item.className = 'wish-item';
        item.innerHTML = `
          <span class="wish-text ${w.done ? 'done' : ''}">${w.name}</span>
          <input type="checkbox" class="wish-cb" ${w.done ? 'checked' : ''} onchange="toggleWishStatus('${w.id}', this.checked)">
        `;
        container.appendChild(item);
      });
    }

    function addWish() {
      const input = document.getElementById('input-wish');
      const val = input.value.trim();
      if(!val) return;
      globalWishes.push({ id: 'w_' + Date.now(), name: val, done: false });
      input.value = '';
      saveWishesState();
    }

    function toggleWishStatus(id, isChecked) {
      const wish = globalWishes.find(w => w.id === id);
      if(wish) { wish.done = isChecked; saveWishesState(); }
    }

    function toggleAddMode() {
      isAdd足迹Mode = !isAdd足迹Mode;
      const btn = document.getElementById('btn-mode-add');
      const alertBar = document.getElementById('mode-alert');
      if(isAdd足迹Mode) {
        btn.classList.add('active');
        alertBar.classList.add('show');
      } else {
        btn.classList.remove('active');
        alertBar.classList.remove('show');
      }
    }

    function openCreateModalFromMap(lat, lng) {
      document.getElementById('trip-form').reset();
      document.getElementById('field-id').value = '';
      document.getElementById('field-lat').value = lat.toFixed(6);
      document.getElementById('field-lng').value = lng.toFixed(6);
      currentUploadedPhotos = [];
      renderPhotoPreviews();
      resetExpensesField();
      toggleAddMode();
      document.getElementById('main-modal').classList.add('open');
    }

    function openDetailView(id) {
      const trip = globalTrips.find(t => t.id === id);
      if(!trip) return;

      document.getElementById('field-id').value = trip.id;
      document.getElementById('field-place').value = trip.place;
      document.getElementById('field-start').value = trip.startDate;
      document.getElementById('field-end').value = trip.endDate;
      document.getElementById('field-lat').value = trip.lat;
      document.getElementById('field-lng').value = trip.lng;
      document.getElementById('field-note').value = trip.note || '';

      const exp = trip.expenses || {};
      document.getElementById('exp-transport').value = exp.transport || 0;
      document.getElementById('exp-stay').value = exp.stay || 0;
      document.getElementById('exp-food').value = exp.food || 0;
      document.getElementById('exp-play').value = exp.play || 0;
      document.getElementById('exp-other').value = exp.other || 0;
      updateExpenseTotal();

      currentUploadedPhotos = trip.photos || [];
      renderPhotoPreviews();
      document.getElementById('main-modal').classList.add('open');
    }

    function closeModal() { document.getElementById('main-modal').classList.remove('open'); }

    function saveTripData(e) {
      e.preventDefault();
      const id = document.getElementById('field-id').value;
      const place = document.getElementById('field-place').value.trim();
      const startDate = document.getElementById('field-start').value;
      const endDate = document.getElementById('field-end').value;
      const lat = parseFloat(document.getElementById('field-lat').value);
      const lng = parseFloat(document.getElementById('field-lng').value);
      const note = document.getElementById('field-note').value;

      const transport = parseFloat(document.getElementById('exp-transport').value) || 0;
      const stay = parseFloat(document.getElementById('exp-stay').value) || 0;
      const food = parseFloat(document.getElementById('exp-food').value) || 0;
      const play = parseFloat(document.getElementById('exp-play').value) || 0;
      const other = parseFloat(document.getElementById('exp-other').value) || 0;
      const total = transport + stay + food + play + other;

      const expenseObj = { total, transport, stay, food, play, other };

      if(id) {
        const idx = globalTrips.findIndex(t => t.id === id);
        if(idx !== -1) {
          globalTrips[idx] = { ...globalTrips[idx], place, startDate, endDate, lat, lng, note, expenses: expenseObj, photos: currentUploadedPhotos };
        }
      } else {
        const newTrip = { id: 't_' + Date.now(), place, startDate, endDate, lat, lng, note, expenses: expenseObj, photos: currentUploadedPhotos };
        globalTrips.unshift(newTrip);
        mapEngine.panTo([lat, lng]);
      }
      saveTripsState();
      closeModal();
    }

    function geoLookup() {
      const place = document.getElementById('field-place').value.trim();
      if(!place) return;
      fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(place)}&limit=1`)
        .then(res => res.json())
        .then(data => {
          if(data && data.length > 0) {
            document.getElementById('field-lat').value = parseFloat(data[0].lat).toFixed(6);
            document.getElementById('field-lng').value = parseFloat(data[0].lon).toFixed(6);
          }
        }).catch(err => console.log('逆向坐标校准略有延迟'));
    }

    function handlePhotoUpload(event) {
      const files = event.target.files;
      if(!files || files.length === 0) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        currentUploadedPhotos.push(e.target.result);
        renderPhotoPreviews();
      };
      reader.readAsDataURL(files[0]);
    }

    function renderPhotoPreviews() {
      const previewBox = document.getElementById('photo-preview-box');
      const heroArea = document.getElementById('view-hero-area');
      previewBox.innerHTML = '';

      if(currentUploadedPhotos.length > 0) {
        heroArea.innerHTML = `<img src="${currentUploadedPhotos[0]}" style="width:100%; height:180px; object-fit:cover; border-radius:16px; margin-bottom:20px; border:1px solid var(--border-light);">`;
        currentUploadedPhotos.forEach((imgSrc) => {
          const img = document.createElement('img');
          img.className = 'photo-thumb';
          img.src = imgSrc;
          img.onclick = () => {
            heroArea.innerHTML = `<img src="${imgSrc}" style="width:100%; height:180px; object-fit:cover; border-radius:16px; margin-bottom:20px; border:1px solid var(--border-light);">`;
          };
          previewBox.appendChild(img);
        });
      } else {
        heroArea.innerHTML = `
          <div class="view-hero-placeholder">
             <span style="font-family: var(--font-serif); font-size: 11px; color: var(--accent-gold); letter-spacing: 3px; font-weight: 300;">AURORA MEMORY</span>
             <span style="width: 20px; height: 1px; background: linear-gradient(90deg, transparent, var(--neon-pink), transparent); margin-top: 8px;"></span>
          </div>`;
      }
    }

    function setupExpenseListener() {
      const inputs = ['exp-transport', 'exp-stay', 'exp-food', 'exp-play', 'exp-other'];
      inputs.forEach(id => { document.getElementById(id).addEventListener('input', updateExpenseTotal); });
    }

    function updateExpenseTotal() {
      const transport = parseFloat(document.getElementById('exp-transport').value) || 0;
      const stay = parseFloat(document.getElementById('exp-stay').value) || 0;
      const food = parseFloat(document.getElementById('exp-food').value) || 0;
      const play = parseFloat(document.getElementById('exp-play').value) || 0;
      const other = parseFloat(document.getElementById('exp-other').value) || 0;
      document.getElementById('exp-total-display').innerText = (transport + stay + food + play + other).toFixed(0);
    }

    function resetExpensesField() {
      document.getElementById('exp-transport').value = 0;
      document.getElementById('exp-stay').value = 0;
      document.getElementById('exp-food').value = 0;
      document.getElementById('exp-play').value = 0;
      document.getElementById('exp-other').value = 0;
      document.getElementById('exp-total-display').innerText = '0';
    }

    function simulateAIScan() {
      const loader = document.getElementById('ai-loading');
      loader.style.display = 'flex';
      setTimeout(() => {
        loader.style.display = 'none';
        document.getElementById('field-place').value = '大理古城';
        document.getElementById('field-start').value = '2026-05-17';
        document.getElementById('field-end').value = '2026-05-20';
        document.getElementById('exp-transport').value = 1240;
        document.getElementById('exp-stay').value = 450;
        document.getElementById('field-note').value = 'AI 自动化扫描：大理双人行单据提取成功...';
        updateExpenseTotal();
        geoLookup();
      }, 1200);
    }
  </script>
</body>
</html>
