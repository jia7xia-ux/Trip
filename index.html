<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XY's MileDiary</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,600;1,400&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #f4eee1 0%, #faf6ee 50%, #eae1d4 100%);
      --card-glass: rgba(255, 253, 249, 0.65);
      --accent-gold: #c3a683;
      --creamy-pink: #eab4b1;
      --text-primary: #4a4138;
      --text-muted: #8e8071;
      --border-light: rgba(195, 166, 131, 0.2);
      --border-med: rgba(195, 166, 131, 0.4);
      --glass-filter: blur(24px) saturate(180%);
      --font-serif: 'Playfair Display', 'Noto Serif SC', serif;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, 'Noto Sans SC', sans-serif;
      --ease-apple: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
      --shadow-ambient: 0 30px 60px rgba(163, 145, 126, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.7);
      --shadow-lifted: 0 40px 80px rgba(142, 128, 113, 0.15), 0 4px 15px rgba(195, 166, 131, 0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-gradient);
      color: var(--text-primary);
      font-family: var(--font-sans);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: ''; position: absolute; top: -10%; left: -10%; width: 120%; height: 120%;
      background: radial-gradient(circle at 15% 20%, rgba(234, 180, 177, 0.25) 0%, transparent 45%),
                  radial-gradient(circle at 85% 80%, rgba(195, 166, 131, 0.2) 0%, transparent 55%);
      z-index: 1; pointer-events: none;
      animation: fluidBg 20s infinite ease-in-out alternate;
    }

    @keyframes fluidBg {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(2%, 4%) scale(1.05); }
    }

    .topbar {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%); width: calc(100% - 48px); max-width: 1200px; height: 64px;
      background: var(--card-glass); backdrop-filter: var(--glass-filter); -webkit-backdrop-filter: var(--glass-filter);
      border: 1px solid var(--border-light); border-radius: 32px; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; z-index: 900; box-shadow: var(--shadow-ambient);
      animation: slideDownIn 1s var(--ease-apple);
    }
    @keyframes slideDownIn {
      0% { transform: translateX(-50%) translateY(-30px); opacity: 0; }
      100% { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
    .logo {
      font-family: var(--font-serif); font-size: 18px; color: var(--text-primary);
      background: linear-gradient(90deg, var(--text-primary) 0%, var(--accent-gold) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; font-weight: 600;
      cursor: default; transition: transform 0.4s var(--ease-bounce);
    }
    .logo:hover { transform: scale(1.02) rotate(-1deg); }
    .nav-group { display: flex; gap: 12px; }
    .nav-btn {
      background: transparent; border: 1px solid transparent; color: var(--text-muted); padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; letter-spacing: 1px; transition: all 0.5s var(--ease-apple);
    }
    .nav-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.5); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(163, 145, 126, 0.08); }
    .nav-btn:active { transform: translateY(0) scale(0.96); }
    .nav-btn.active {
      border-color: var(--border-med); color: #fff; background: linear-gradient(135deg, var(--accent-gold) 0%, #b39571 100%); box-shadow: 0 8px 20px rgba(195, 166, 131, 0.3);
    }

    .map-wrapper {
      position: absolute; inset: 0; z-index: 10; padding: 100px 40px 120px 40px; display: flex; justify-content: center; align-items: center;
      animation: fadeInScale 1.2s var(--ease-apple);
    }
    @keyframes fadeInScale {
      0% { opacity: 0; transform: scale(0.96); filter: blur(5px); }
      100% { opacity: 1; transform: scale(1); filter: blur(0); }
    }
    .sphere-container {
      position: relative; width: 100%; height: 100%; max-width: 1000px; max-height: 680px; border-radius: 40px; box-shadow: 0 40px 80px rgba(142, 128, 113, 0.15), inset 0 0 20px rgba(255,255,255,0.6); overflow: hidden; border: 1px solid var(--border-light); transition: box-shadow 0.6s var(--ease-apple);
    }
    .sphere-container:hover { box-shadow: 0 50px 100px rgba(142, 128, 113, 0.22); }
    #map { width: 100%; height: 100%; background: #f7f3ec; transition: filter 0.5s ease; }
    body.has-overlay #map { filter: blur(4px); }

    /* ── 打卡标记点 ── */
    .creamy-marker-container { background: transparent; border: none; width: 24px !important; height: 24px !important; display: flex; align-items: center; justify-content: center; }
    .pearl-dot {
      width: 11px; height: 11px; background: #ffffff; border: 2.5px solid var(--accent-gold); border-radius: 50%; position: relative; box-shadow: 0 3px 8px rgba(142, 128, 113, 0.3); transition: all 0.4s var(--ease-bounce); cursor: pointer;
    }
    .pearl-dot::before {
      content: ''; position: absolute; inset: -8px; border-radius: 50%; background: rgba(195, 166, 131, 0.2); animation: pearlBreath 2.5s infinite cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none;
    }
    .pearl-dot:hover { transform: scale(1.4); border-color: #e0928e; background: #fff; box-shadow: 0 0 20px rgba(234, 180, 177, 0.9); }
    @keyframes pearlBreath { 0%, 100% { transform: scale(0.8); opacity: 0.3; } 50% { transform: scale(1.3); opacity: 1; } }

    .multi-marker-container { background: transparent; border: none; display: flex; align-items: center; justify-content: center; }
    .multi-badge {
      position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--accent-gold) 0%, #b39571 100%); border: 2px solid rgba(255,255,255,0.9); border-radius: 50%; width: 28px; height: 28px; box-shadow: 0 4px 12px rgba(195, 166, 131, 0.4); transition: all 0.4s var(--ease-bounce); font-family: var(--font-serif); font-size: 12px; font-weight: 700; color: #fff;
    }
    .multi-badge::before { content: ''; position: absolute; inset: -7px; border-radius: 50%; background: rgba(195, 166, 131, 0.25); animation: pearlBreath 2.2s infinite cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
    .multi-badge:hover { transform: scale(1.25); box-shadow: 0 0 24px rgba(234, 180, 177, 0.9); border-color: var(--creamy-pink); }

    /* ── 城市记录弹层 ── */
    .city-popup {
      position: fixed; inset: 0; z-index: 1100; display: none; align-items: center; justify-content: center; background: rgba(74, 65, 56, 0.12); backdrop-filter: blur(8px); padding: 20px; opacity: 0; transition: opacity 0.4s var(--ease-apple);
    }
    .city-popup.open { display: flex; opacity: 1; }
    .city-popup-inner {
      background: rgba(255, 254, 252, 0.96); border: 1px solid var(--border-light); border-radius: 28px; padding: 32px; width: 100%; max-width: 480px; box-shadow: var(--shadow-lifted); position: relative; max-height: 80vh; display: flex; flex-direction: column; transform: scale(0.9) translateY(20px); transition: transform 0.5s var(--ease-bounce);
    }
    .city-popup.open .city-popup-inner { transform: scale(1) translateY(0); }
    .city-popup-title { font-family: var(--font-serif); font-size: 20px; color: var(--text-primary); margin-bottom: 6px; font-weight: 400; }
    .city-popup-subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
    .city-trip-list { overflow-y: auto; flex: 1; }
    .city-trip-row {
      display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: rgba(255,255,255,0.6); border: 1px solid var(--border-light); border-radius: 16px; margin-bottom: 12px; cursor: pointer; transition: all 0.4s var(--ease-apple);
    }
    .city-trip-row:hover { transform: translateX(6px) scale(1.01); background: #ffffff; border-color: var(--accent-gold); box-shadow: 0 6px 15px rgba(163, 145, 126, 0.08); }
    .city-trip-info .trip-num { font-size: 11px; color: var(--accent-gold); font-weight: 600; margin-bottom: 2px; }
    .city-trip-info .trip-dates { font-size: 13px; color: var(--text-primary); font-weight: 500; }
    .city-trip-info .trip-hotel { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .city-popup-close { position: absolute; top: 16px; right: 20px; background: none; border: none; font-size: 22px; color: var(--text-muted); cursor: pointer; }

    /* ── 底部统计 ── */
    .stats-pill {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: var(--card-glass); backdrop-filter: var(--glass-filter); -webkit-backdrop-filter: var(--glass-filter); border: 1px solid var(--border-light); padding: 14px 44px; border-radius: 40px; display: flex; gap: 48px; z-index: 900; box-shadow: var(--shadow-ambient); transition: all 0.5s var(--ease-apple); animation: slideUpIn 1s var(--ease-apple);
    }
    .stats-pill:hover { transform: translateX(-50%) translateY(-4px); box-shadow: var(--shadow-lifted); background: rgba(255, 253, 249, 0.8); }
    @keyframes slideUpIn { 0% { transform: translateX(-50%) translateY(40px); opacity: 0; } 100% { transform: translateX(-50%) translateY(0); opacity: 1; } }
    .stat-item { text-align: center; }
    .stat-label { font-size: 11px; color: var(--text-muted); letter-spacing: 1.5px; margin-bottom: 4px; font-weight: 500; }
    .stat-val { font-family: var(--font-serif); font-size: 20px; color: var(--text-primary); font-weight: 600; }

    /* ── 侧边面板 ── */
    .side-panel {
      position: fixed; top: 0; right: 0; width: 400px; height: 100vh; background: rgba(253, 251, 247, 0.82); backdrop-filter: var(--glass-filter); -webkit-backdrop-filter: var(--glass-filter); border-left: 1px solid var(--border-light); z-index: 950; transform: translateX(100%); transition: transform 0.75s var(--ease-apple); padding: 100px 32px 40px 32px; display: flex; flex-direction: column;
    }
    .side-panel.open { transform: translateX(0); box-shadow: -20px 0 60px rgba(163, 145, 126, 0.15); }
    .side-panel.open .timeline-item { animation: panelItemIn 0.6s var(--ease-apple) both; }
    .side-panel.open .timeline-item:nth-child(1) { animation-delay: 0.1s; }
    .side-panel.open .timeline-item:nth-child(2) { animation-delay: 0.15s; }
    .side-panel.open .timeline-item:nth-child(3) { animation-delay: 0.2s; }
    @keyframes panelItemIn { 0% { transform: translateX(30px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
    .panel-title { font-family: var(--font-serif); font-size: 22px; color: var(--text-primary); font-weight: 400; margin-bottom: 32px; letter-spacing: 1px; }
    .timeline-container { flex: 1; overflow-y: auto; padding-right: 8px; }
    .timeline-item { position: relative; padding-left: 24px; margin-bottom: 24px; cursor: pointer; transition: all 0.4s var(--ease-apple); }
    .timeline-item:hover { transform: translateX(6px); }
    .timeline-item::before { content: ''; position: absolute; left: 0; top: 6px; width: 8px; height: 8px; background: var(--creamy-pink); border-radius: 50%; box-shadow: 0 0 10px var(--creamy-pink); transition: transform 0.3s var(--ease-bounce); }
    .timeline-item:hover::before { transform: scale(1.5); background: var(--accent-gold); box-shadow: 0 0 12px var(--accent-gold); }
    .timeline-item::after { content: ''; position: absolute; left: 3px; top: 18px; bottom: -20px; width: 2px; background: rgba(195,166,131,0.2); }
    .timeline-item:last-child::after { display: none; }
    .tl-date { font-family: var(--font-serif); font-size: 13px; color: var(--accent-gold); font-weight: 600; }
    .tl-name { font-size: 14px; color: var(--text-primary); margin-top: 2px; font-weight: 500; }

    .wish-input-box { display: flex; gap: 12px; margin-bottom: 24px; }
    .wish-list { flex: 1; overflow-y: auto; }
    .wish-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: rgba(255,255,255,0.6); border: 1px solid var(--border-light); border-radius: 14px; margin-bottom: 12px; }
    .wish-text { font-size: 13px; color: var(--text-primary); font-weight: 500; }
    .wish-text.done { color: var(--text-muted); text-decoration: line-through; opacity: 0.5; }
    .wish-cb { width: 18px; height: 18px; accent-color: var(--accent-gold); cursor: pointer; }

    /* ── 重构后的主弹窗（修复重叠、拔除AI） ── */
    .modal {
      display: none; position: fixed; inset: 0; background: rgba(74, 65, 56, 0.15); backdrop-filter: blur(15px); z-index: 1000; align-items: center; justify-content: center; padding: 24px; opacity: 0; transition: opacity 0.5s var(--ease-apple);
    }
    .modal.open { display: flex; opacity: 1; }
    
    .modal-content {
      background: rgba(255, 254, 252, 0.98); 
      border: 1px solid var(--border-light); 
      border-radius: 32px; 
      width: 100%; 
      max-width: 900px; 
      height: 85vh; 
      display: grid; 
      grid-template-columns: 1.1fr 0.9fr; /* 科学定义左右比例，防止挤压 */
      box-shadow: var(--shadow-lifted); 
      position: relative; 
      overflow: hidden;
      transform: translateY(40px) scale(0.95); 
      transition: transform 0.6s var(--ease-apple);
    }
    .modal.open .modal-content { transform: translateY(0) scale(1); }
    .modal-close-btn { position: absolute; top: 24px; right: 24px; background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; z-index: 10; transition: color 0.3s; }
    .modal-close-btn:hover { color: var(--text-primary); }
    
    /* 左栏表单区域 */
    .modal-left { 
      padding: 40px; 
      border-right: 1px solid var(--border-light); 
      overflow-y: auto; 
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    /* 右栏随笔、账目、胶片区域 */
    .modal-right { 
      padding: 40px; 
      overflow-y: auto; 
      background: rgba(247,243,236,0.4); 
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group { margin-bottom: 4px; }
    .form-label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.5px; font-weight: 600; }
    .form-input { 
      width: 100%; background: #ffffff; border: 1px solid var(--border-light); border-radius: 14px; padding: 12px 16px; color: var(--text-primary); font-size: 13px; transition: all 0.4s var(--ease-apple); 
    }
    .form-input:focus { outline: none; border-color: var(--accent-gold); box-shadow: 0 0 0 3px rgba(195,166,131,0.15); transform: translateY(-1px); }
    
    .expense-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 4px; }
    .exp-box { background: #ffffff; border: 1px solid var(--border-light); border-radius: 12px; padding: 12px 8px; text-align: center; transition: all 0.3s var(--ease-apple); }
    .exp-box:focus-within { border-color: var(--accent-gold); box-shadow: 0 6px 15px rgba(195,166,131,0.1); transform: translateY(-2px); }
    .exp-label { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-bottom: 4px; }
    .exp-input { width: 100%; background: transparent; border: none; text-align: center; color: var(--text-primary); font-family: var(--font-serif); font-size: 15px; font-weight: 600; }
    .exp-input:focus { outline: none; }
    
    .photo-scroller { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; margin-top: 8px; }
    .photo-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 1px solid var(--border-light); cursor: pointer; transition: transform 0.3s; }
    .photo-thumb:hover { transform: scale(1.05); }
    
    .view-hero-placeholder {
      width: 100%; height: 140px; background: rgba(255,255,255,0.6); border: 1px dashed var(--border-med); border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 4px; color: var(--text-muted); font-size: 12px;
    }

    .btn-action { 
      background: linear-gradient(135deg, var(--accent-gold) 0%, #b39571 100%); color: #ffffff; border: none; padding: 14px 24px; border-radius: 24px; font-weight: 600; font-size: 13px; cursor: pointer; width: 100%; letter-spacing: 1px; box-shadow: 0 6px 20px rgba(195, 166, 131, 0.3); transition: all 0.4s var(--ease-apple); margin-top: auto;
    }
    .btn-action:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(195, 166, 131, 0.45); filter: brightness(1.05); }
    .btn-action:active { transform: translateY(0); }

    .apple-alert {
      position: fixed; top: 104px; left: 50%; transform: translateX(-50%) translateY(-20px); background: linear-gradient(135deg, var(--accent-gold) 0%, #b39571 100%); color: #fff; padding: 12px 32px; border-radius: 24px; font-size: 12px; font-weight: 500; letter-spacing: 0.5px; z-index: 850; pointer-events: none; opacity: 0; transition: all 0.5s var(--ease-bounce); box-shadow: 0 12px 30px rgba(195,166,131,0.25);
    }
    .apple-alert.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: rgba(195, 166, 131, 0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-gold); }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo">✦ XY's MileDiary</div>
    <div class="nav-group">
      <button class="nav-btn" id="btn-timeline" onclick="togglePanel('timeline')">🕐 时光轴</button>
      <button class="nav-btn" id="btn-wish" onclick="togglePanel('wish')">✨ 心愿清单</button>
      <button class="nav-btn" id="btn-mode-add" onclick="toggleAddMode()">💝 打卡足迹</button>
    </div>
  </div>

  <div class="apple-alert" id="mode-alert">互动开启：点击中心浅色底图，封存双人足迹坐标</div>

  <div class="map-wrapper">
    <div class="sphere-container">
      <div id="map"></div>
    </div>
  </div>

  <div class="stats-pill">
    <div class="stat-item">
      <div class="stat-label">EXPLORED CITIES</div>
      <div class="stat-val" id="stat-cities">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">TOTAL JOURNEYS</div>
      <div class="stat-val" id="stat-trips">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">MUTUAL BUDGET</div>
      <div class="stat-val" id="stat-budget">¥0</div>
    </div>
  </div>

  <div class="side-panel" id="side-panel">
    <div id="panel-content-timeline" style="display:none; flex-direction:column; height:100%;">
      <h3 class="panel-title">时光叙事轴</h3>
      <div class="timeline-container" id="timeline-list"></div>
    </div>
    <div id="panel-content-wish" style="display:none; flex-direction:column; height:100%;">
      <h3 class="panel-title">下一站心愿</h3>
      <div class="wish-input-box">
        <input type="text" id="input-wish" class="form-input" placeholder="输入浪漫目的地..." style="flex:1;">
        <button class="nav-btn active" onclick="addWish()" style="padding:0 16px;">添加</button>
      </div>
      <div class="wish-list" id="wish-container"></div>
    </div>
  </div>

  <div class="city-popup" id="city-popup">
    <div class="city-popup-inner">
      <button class="city-popup-close" onclick="closeCityPopup()">×</button>
      <div class="city-popup-title" id="city-popup-name"></div>
      <div class="city-popup-subtitle" id="city-popup-sub"></div>
      <div class="city-trip-list" id="city-trip-list"></div>
    </div>
  </div>

  <div class="modal" id="main-modal">
    <div class="modal-content">
      <button class="modal-close-btn" onclick="closeModal()">×</button>
      
      <div class="modal-left">
        <h3 style="font-family: var(--font-serif); font-size: 20px; color: var(--text-primary); font-weight: 400; margin-bottom: 10px;">封存新映像</h3>
        
        <form id="trip-form" onsubmit="saveTripData(event)" style="display: flex; flex-direction: column; gap: 16px; height: 100%;">
          <input type="hidden" id="field-id">
          
          <div class="form-group">
            <label class="form-label">目的地 (失焦自动校准坐标)</label>
            <input type="text" id="field-place" class="form-input" required placeholder="例如：大理古城" onblur="geoLookup()">
          </div>
          
          <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
            <div>
              <label class="form-label">启程日期</label>
              <input type="date" id="field-start" class="form-input" required>
            </div>
            <div>
              <label class="form-label">归期</label>
              <input type="date" id="field-end" class="form-input" required>
            </div>
          </div>
          
          <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
            <div>
              <label class="form-label">LAT (纬度)</label>
              <input type="number" step="0.000001" id="field-lat" class="form-input" required>
            </div>
            <div>
              <label class="form-label">LNG (经度)</label>
              <input type="number" step="0.000001" id="field-lng" class="form-input" required>
            </div>
          </div>
          
          <div class="form-group" style="display: grid; grid-template-columns: 2fr 1fr; gap: 14px;">
            <div>
              <label class="form-label">🏨 浪漫下榻</label>
              <input type="text" id="field-hotel" class="form-input" placeholder="酒店/民宿名称">
            </div>
            <div>
              <label class="form-label">推荐指数</label>
              <input type="text" id="field-hotel-rating" class="form-input" placeholder="💖 5星">
            </div>
          </div>

    function calculateDashboardStats() {
    console.log("正在计算统计数据，当前行程数:", globalTrips.length);
    
    // 1. 行程数 (直接读取数组长度)
    document.getElementById('stat-trips').innerText = globalTrips.length;

    const uniqueCities = new Set(globalTrips.map(t => t.place));
    document.getElementById('stat-cities').innerText = uniqueCities.size;

    // 3. 总预算 (包含JSON解析容错)
    const total = globalTrips.reduce((sum, t) => {
        let cost = 0;
        try {
            // 如果 expenses 是 JSON 字符串则解析，否则直接读取
            const exp = typeof t.expenses === 'string' ? JSON.parse(t.expenses) : t.expenses;
            // 确保读取的是数字
            cost = Number(exp?.total || exp || 0);
        } catch (e) {
            console.error("该记录预算解析错误:", t.id);
        }
        return sum + cost;
    }, 0);
    
    document.getElementById('stat-budget').innerText = '¥' + total.toLocaleString();
}

    function renderVisualMarkers() {
      mapMarkers.forEach(m => mapEngine.removeLayer(m));
      globalTrips.forEach(t => {
        const icon = L.divIcon({
          className: 'creamy-marker-container',
          html: `<div class="pearl-dot" onclick="openDetailView('${t.id}')"></div>`,
          iconSize: [24, 24]
        });
        const m = L.marker([t.lat, t.lng], { icon }).addTo(mapEngine);
        mapMarkers.push(m);
      });
    }
