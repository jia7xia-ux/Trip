<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>映像记忆</title>
  <style>
    /* 核心奢华黑金意象美学变量 */
    :root {
      --bg-dark: #0f0d0e;
      --card-dark: #151314;
      --accent-gold: #dfba8c;
      --text-primary: #f2f0f0;
      --text-light: #8e8a88;
      --border-light: rgba(223, 186, 140, 0.12);
      --border-med: rgba(223, 186, 140, 0.25);
      --glass-modal: rgba(21, 19, 20, 0.95);
      --font-serif: "Playfair Display", "Noto Serif SC", Georgia, serif;
      --shadow-ambient: 0 20px 50px rgba(0,0,0,0.5);
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 20px;
    }

    /* 触发弹窗的临时按钮样式 */
    .demo-btn {
      background: transparent;
      border: 1px solid var(--border-med);
      color: var(--accent-gold);
      padding: 10px 24px;
      border-radius: 30px;
      cursor: pointer;
      font-family: var(--font-serif);
      letter-spacing: 1px;
      margin-right: 12px;
      transition: all 0.3s ease;
    }
    .demo-btn:hover {
      background: var(--accent-gold);
      color: var(--bg-dark);
    }

    /* 弹窗基础样式 */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 9, 9, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-content {
      background: var(--card-dark);
      border: 1px solid var(--border-light);
      border-radius: 24px;
      width: 100%;
      max-width: 460px;
      padding: 32px;
      box-shadow: var(--shadow-ambient);
      box-sizing: border-box;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 24px;
      right: 24px;
      background: none;
      border: none;
      color: var(--text-light);
      font-size: 20px;
      cursor: pointer;
    }

    /* 弹窗内表单与基础元素的微调 */
    .modal-title {
      font-family: var(--font-serif);
      font-size: 20px;
      color: var(--accent-gold);
      font-weight: 300;
      letter-spacing: 1px;
      margin-top: 0;
      margin-bottom: 24px;
    }
    .ai-scan-btn {
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .ai-scan-btn:hover {
      background: rgba(223, 186, 140, 0.1) !important;
    }
    .view-hero {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 18px;
      margin-bottom: 24px;
    }
    .view-details {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- 演示触发按钮 -->
  <button class="demo-btn" onclick="openAddModal()">＋ 记录新篇章</button>
  <button class="demo-btn" onclick="triggerViewModalDemo()">🎬 查看映像封面</button>

  <!-- ================================================================= -->
  <!-- 1. 记录新篇章弹窗 (包含高级感 AI 智能扫描仓) -->
  <!-- ================================================================= -->
  <div class="modal" id="modal-add">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal('modal-add')">×</button>
      <h3 class="modal-title">记录新篇章</h3>
      
      <!-- 高级留白电影质感 AI 票据智能扫描仓 -->
      <div class="ai-scanner-box" id="ai-scanner-container" style="background: linear-gradient(180deg, rgba(223,186,140,0.02) 0%, rgba(25,23,24,0) 100%); border: 1px dashed rgba(223, 186, 140, 0.25); padding: 20px; margin-bottom: 24px; position: relative; overflow: hidden; border-radius: 16px;">
        <div style="display: flex; align-items: center; gap: 16px; width: 100%; z-index: 1;">
          <div style="font-family: var(--font-serif); font-size: 20px; color: var(--accent-gold); font-weight: 300; letter-spacing: 1px;">AI</div>
          <div style="flex: 1; border-left: 1px solid rgba(223,186,140,0.15); padding-left: 16px;">
            <div style="font-size: 13px; font-weight: 400; color: var(--text-primary); letter-spacing: 0.5px;">票据智能校准</div>
            <div style="font-size: 11px; color: var(--text-light); margin-top: 3px; font-weight: 300;">上传单据截图 · 智能转译经纬坐标与资产花费</div>
          </div>
          <button class="ai-scan-btn" style="background: transparent; border: 1px solid var(--border-med); color: var(--accent-gold); padding: 6px 16px; border-radius: 30px; letter-spacing: 0.5px; font-size: 12px;" onclick="document.getElementById('ai-file').click()">导入凭证</button>
        </div>
        <input type="file" id="ai-file" accept="image/*" style="display:none" onchange="window.triggerAIScan(event)">
        <div class="ai-scan-loading" id="ai-loading" style="position: absolute; inset: 0; background: var(--glass-modal); display: none; align-items: center; justify-content: center; font-size: 12px; color: var(--accent-gold); font-family: var(--font-serif); letter-spacing: 1px;">ANALYZING DATA STRUCTURE...</div>
      </div>

      <!-- 模拟其余表单项，保持整体和谐度 -->
      <div style="font-size: 12px; color: var(--text-light); text-align: center; font-style: italic; opacity: 0.5;">- 基础表单字段占位 -</div>
    </div>
  </div>

  <!-- ================================================================= -->
  <!-- 2. 查看映像弹窗 (通过 JS 动态渲染高级感纯黑占位封面) -->
  <!-- ================================================================= -->
  <div class="modal" id="modal-view">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal('modal-view')">×</button>
      <h3 class="modal-title" id="view-title">映像详情</h3>
      <!-- 动态注入区域：如果有照片则显示照片，没有则显示下面 JS 中配置的极简黑金高光封面 -->
      <div id="view-hero-area"></div>
      <div class="view-details" id="view-desc">
        这里是关于此段光影旅程的细节描摹...
      </div>
    </div>
  </div>

  <!-- ================================================================= -->
  <!-- JavaScript 控制层 -->
  <!-- ================================================================= -->
  <script>
    // 基础弹窗开关控制
    function openAddModal() {
      document.getElementById('modal-add').style.display = 'flex';
    }
    function closeModal(id) {
      document.getElementById(id).style.display = 'none';
    }

    // AI 扫描模拟触发
    window.triggerAIScan = function(event) {
      const loading = document.getElementById('ai-loading');
      if(loading) {
        loading.style.display = 'flex';
        setTimeout(() => {
          loading.style.display = 'none';
          alert('AI 数据校准完成');
        }, 1500);
      }
    };

    // 核心函数：查看映像模态框触发 (包含优化后的纯黑高级感占位封面)
    window.openViewModal = function(t) {
      const heroArea = document.getElementById('view-hero-area');
      
      // 核心替换逻辑：如果没有照片，渲染径向渐变黑金质感封面（去除了廉价 Emoji 图标）
      const heroImg = t.photos && t.photos.length > 0 ? 
        `<img src="${t.photos[0]}" class="view-hero">` : 
        `<div class="view-hero-placeholder" style="width: 100%; height: 200px; background: radial-gradient(circle at center, #1e1b1c 0%, #121011 100%); border: 1px solid var(--border-light); border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 24px; box-shadow: var(--shadow-ambient);">
           <span style="font-family: var(--font-serif); font-size: 11px; color: var(--accent-gold); letter-spacing: 3px; font-weight: 300; opacity: 0.85;">SWEET MEMORY</span>
           <span style="width: 16px; height: 1px; background: var(--accent-gold); opacity: 0.3; margin-top: 8px;"></span>
         </div>`;

      heroArea.innerHTML = heroImg;
      document.getElementById('view-title').innerText = t.title || "映像详情";
      document.getElementById('modal-view').style.display = 'flex';
    };

    // 演示无照片时的高级感占位封面
    function triggerViewModalDemo() {
      window.openViewModal({
        title: "新加坡植物园漫步",
        photos: [] // 故意留空以激活极简占位封面效果
      });
    }
  </script>
</body>
</html>
